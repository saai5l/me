<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Tajawal:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.min.css" />
<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.key === 'F12') { e.preventDefault(); return; }
    if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) { e.preventDefault(); return; }
    if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return; }
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); return; }
  });
</script>
</head>

<body>
  <div id="loader">
    <div class="ld-shell">
      <div class="ld-header">
        <span class="ld-dot r"></span><span class="ld-dot y"></span><span class="ld-dot g"></span>
        <span class="ld-title">profile.init</span>
      </div>
      <div class="ld-body" id="ldBody"></div>
      <div class="ld-foot">
        <div class="ld-prog-wrap">
          <div class="ld-prog" id="ldProg"></div>
        </div>
        <span class="ld-pct" id="ldPct">0%</span>
      </div>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-logo">
      <span class="logo-bracket">[</span>
      <span class="logo-text">Profile</span>
      <span class="logo-bracket">]</span>
    </div>
    <div class="topbar-right">
      <div class="visitor-chip">
        <i class="fa-solid fa-eye"></i>
        <span id="visitorCount">—</span>
      </div>
      <button class="icon-btn" id="themeBtn" title="Toggle theme">
        <i class="fa-solid fa-circle-half-stroke"></i>
      </button>
    </div>
  </header>
  <main id="main">

    <div class="bg-noise"></div>

    <section class="profile-wrap">
      <div class="pf-banner" id="pfBanner">
        <div class="pf-banner-overlay"></div>
        <canvas class="pf-banner-canvas" id="bannerCanvas"></canvas>
      </div>
      <div class="pf-card">

        <div class="pf-left">
          <div class="pf-avatar-frame" id="pfAvatarFrame">
            <img id="pfAvatar" class="pf-avatar" src="" alt="avatar" />
            <div class="pf-avatar-spinner" id="pfSpinner">
              <i class="fa-solid fa-spinner fa-spin"></i>
            </div>
            <div class="pf-status-ring" id="pfStatusRing"></div>
          </div>

          <div class="pf-status-pill" id="pfStatusPill">
            <span class="pf-status-dot" id="pfStatusDot"></span>
            <span id="pfStatusText">Loading...</span>
          </div>
        </div>

        <div class="pf-right">
          <div class="pf-name-row">
            <h1 class="pf-name" id="pfName">———</h1>
            <div class="pf-tag" id="pfTag"></div>
          </div>

          <p class="pf-bio" id="pfBio">—</p>

          <div class="pf-socials" id="pfSocials">
            <a class="social-btn discord-btn" id="socialDiscord" href="#" target="_blank" rel="noopener">
              <i class="fa-brands fa-discord"></i>
              <span>Discord</span>
            </a>
            <a class="social-btn x-btn" id="socialX" href="#" target="_blank" rel="noopener">
              <i class="fa-brands fa-x-twitter"></i>
              <span>Twitter</span>
            </a>
            <a class="social-btn kick-btn" id="socialKick" href="#" target="_blank" rel="noopener">
              <svg class="kick-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 2h4v8l6-8h5l-7 9 7 11h-5l-6-9v9H2V2z" />
              </svg>
              <span>Kick</span>
            </a>
            <a class="social-btn instagram-btn" id="socialInstagram" href="#" target="_blank" rel="noopener">
              <i class="fa-brands fa-instagram"></i>
              <span>Instagram</span>
            </a>
            <a class="social-btn tiktok-btn" id="socialTikTok" href="#" target="_blank" rel="noopener">
              <i class="fa-brands fa-tiktok"></i>
              <span>TikTok</span>
            </a>
          </div>

          <div class="pf-activity" id="pfActivity" style="display:none">
            <i class="fa-solid fa-circle-dot"></i>
            <span id="pfActivityText"></span>
          </div>
          
        </div>
    </section>

    <section class="stores-section">
      <div class="sec-header">
        <div class="sec-label">
          <span class="sec-slash">//</span>
          <h2 class="sec-title">Skills</h2>
        </div>
        <div class="sec-rule"></div>
      </div>

      <div class="pf-socials">
        <span class="skill-item lua"><i class="fas fa-microchip"></i> Lua</span>
        <span class="skill-item sql"><i class="fas fa-database"></i> SQL</span>
        <span class="skill-item html"><i class="fab fa-html5"></i> HTML</span>
        <span class="skill-item css"><i class="fab fa-css3-alt"></i> CSS</span>
        <span class="skill-item js"><i class="fab fa-js"></i> JavaScript</span>
      </div>
    </section>

    <section class="stores-section">
      <div class="sec-header">
        <div class="sec-label">
          <span class="sec-slash">//</span>
          <h2 class="sec-title">Stores & Servers</h2>
          <span class="sec-badge" id="storesBadge">0</span>
        </div>
        <div class="sec-rule"></div>
      </div>

      <div class="stores-grid" id="storesGrid">
        <div class="store-skel"></div>
        <div class="store-skel"></div>
        <div class="store-skel"></div>
      </div>
    </section>

  </main>

  <template id="storeTpl">
    <article class="store-card">
      <div class="sc-banner-wrap">
        <img class="sc-banner-img" src="" alt="" />
        <div class="sc-banner-fallback"></div>
        <div class="sc-status-tag"></div>
      </div>
      <div class="sc-body">
        <div class="sc-top-row">
          <div class="sc-icon-wrap">
            <img class="sc-icon" src="" alt="" />
          </div>
          <div class="sc-owner-block">
            <span class="sc-owner-label">
              <i class="fa-solid fa-user-shield"></i> Owner
            </span>
            <div class="sc-owner-row">
              <img class="sc-owner-av" src="" alt="" />
              <span class="sc-owner-name"></span>
            </div>
          </div>
        </div>
        <div class="sc-info">
          <h3 class="sc-name"></h3>
          <p class="sc-desc"></p>
        </div>
        <div class="sc-meta-row">
          <span class="sc-members">
            <i class="fa-solid fa-users"></i>
            <span class="sc-members-val"></span>
          </span>
          <span class="sc-id-tag"></span>
        </div>
        <div class="sc-footer">
          <a class="sc-visit-btn" href="#" target="_blank" rel="noopener">
            <i class="fa-brands fa-discord"></i>
            <span>زيارة المتجر</span>
            <i class="fa-solid fa-arrow-left sc-arrow"></i>
          </a>
        </div>
      </div>
    </article>
  </template>

  <script src="script.obf.js"></script>

</html>
